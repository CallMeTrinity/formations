name: CI

# Qualite de l'application Symfony (dossier site/) : PHP-CS-Fixer, PHPStan, PHPUnit.
on:
  push:
    branches: [ main ]
    paths:
      - 'site/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'site/**'
      - '.github/workflows/ci.yml'

defaults:
  run:
    working-directory: site

jobs:
  qa:
    name: Lint, analyse, tests
    runs-on: ubuntu-latest

    # Les tests utilisent SQLite (cf. site/.env.test), comme en local : pas de
    # service MariaDB ni de DATABASE_URL ici, sinon une vraie variable d'env
    # ecraserait .env.test et ferait tourner les tests sur une base inexistante.

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_sqlite, sqlite3
          tools: composer:v2
          coverage: none

      - name: Get Composer cache dir
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('site/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Warm cache (PHPStan Symfony container)
        run: php bin/console cache:warmup --env=dev

      - name: PHP-CS-Fixer (dry-run)
        env:
          PHP_CS_FIXER_IGNORE_ENV: 1
        run: vendor/bin/php-cs-fixer fix --dry-run --diff

      - name: PHPStan
        run: vendor/bin/phpstan analyse --no-progress

      - name: Build Tailwind (asset "tailwindcss" requis au rendu des templates)
        run: php bin/console tailwind:build

      - name: Prepare test database (schema SQLite)
        run: php bin/console doctrine:schema:create --env=test --no-interaction

      - name: PHPUnit
        run: php bin/phpunit
