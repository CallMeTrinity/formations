name: Deploy

# Deploie sur formations.antoninpamart.fr en lancant ./deploy.sh sur le serveur.
# Le script (cote serveur) fait : git fetch --tags, checkout du dernier tag, puis
# dans site/ : composer install --no-dev, migrations Doctrine, tailwind:build,
# asset-map:compile, cache:clear.
#  - push d'un tag `vX.Y.Z` -> deploiement automatique
#  - lancement manuel        -> redeploie le dernier tag present sur origin
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Un seul deploiement a la fois pour eviter deux ./deploy.sh concurrents
# (composer / migrations) sur le serveur.
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest

    steps:
      - name: Configure SSH key
        run: |
          install -m 700 -d ~/.ssh
          install -m 600 /dev/stdin ~/.ssh/id_formations <<< "${{ secrets.SSH_PRIVATE_KEY }}"
          ssh-keyscan -p "${{ vars.SSH_PORT }}" -H "${{ vars.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Run deploy.sh on the server
        env:
          SSH_HOST: ${{ vars.SSH_HOST }}
          SSH_USER: ${{ vars.SSH_USER }}
          SSH_PORT: ${{ vars.SSH_PORT }}
          APP_DIR: ${{ vars.APP_DIR }}
        run: |
          ssh -i ~/.ssh/id_formations -p "${SSH_PORT}" \
            -o IdentitiesOnly=yes -o BatchMode=yes \
            "${SSH_USER}@${SSH_HOST}" \
            "cd '${APP_DIR}' && ./deploy.sh"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/id_formations
